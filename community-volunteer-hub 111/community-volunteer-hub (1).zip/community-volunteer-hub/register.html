<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up – Community Help Hub</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/forms.css"/>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon"><img src="images/logo.png" alt="Community Help Hub logo" ></div>
      <span class="nav-logo-text">Community Help Hub</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="requests.html">Browse</a></li>
    </ul>
  </nav>

  <main class="main-content auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <img src="images/logo.png" alt="Community Help Hub logo" class="logo-lg">
        <h1>Create Your Account</h1>
        <p>Join the community and start helping or getting help</p>
      </div>

      <form id="register-form" novalidate>
        <div class="form-group">
          <label for="name">Full Name <span class="required-star">*</span></label>
          <input type="text" id="name" class="form-control" placeholder="e.g., John Doe"/>
          <span class="error-msg" id="name-error"></span>
        </div>
        <div class="form-group">
          <label for="email">Email Address <span class="required-star">*</span> </label>
          <input type="email" id="email" class="form-control" placeholder="e.g., john@example.com"/>
          <span class="error-msg" id="email-error"></span>
        </div>
        <div class="form-group">
          <label for="password">Password <span class="required-star">*</span> </label>
          <input type="password" id="password" class="form-control" placeholder="At least 6 characters"/>
          <span class="error-msg" id="password-error"></span>
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password <span class="required-star">*</span> </label>
          <input type="password" id="confirm-password" class="form-control" placeholder="Repeat your password"/>
          <span class="error-msg" id="confirm-password-error"></span>
        </div>
        <div class="form-group">
          <label class="terms-label">
            <input type="checkbox" id="terms" class="terms-checkbox"/>
            <span class="terms-text">I agree to the <a href="terms.html" class="terms-link">Terms of Service</a> and <a href="privacy.html" class="terms-link">Privacy Policy</a></span>
          </label>
          <span class="error-msg" id="terms-error"></span>
        </div>
        <button type="submit" class="btn-primary btn-large">Create Account</button>
        <div class="alert-success" id="success-msg">✅ Account created! Redirecting to login...</div>
      </form>

      <p class="auth-switch">Already have an account? <a href="login.html">Sign in here</a></p>
    </div>
  </main>

  <footer class="simple-footer">
    <p class="footer-copy">© 2026 Community Help Hub. All rights reserved.</p>
  </footer>

  <script src="js/validation.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
