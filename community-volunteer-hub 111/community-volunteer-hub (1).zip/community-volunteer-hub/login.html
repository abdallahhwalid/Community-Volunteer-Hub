<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Community Help Hub</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/forms.css"/>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon"><img src="images/logo.png" alt="Community Help Hub logo" ></div>
      <span class="nav-logo-text">Community Help Hub</span>
    </a>
  </nav>

  <main class="main-content auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="nav-logo-icon" style="width:52px;height:52px;font-size:22px;margin:0 auto 16px;">♥</div>
        <h1>Welcome Back</h1>
        <p>Sign in to your account</p>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email Address <span class="required-star">*</span></label>
          <input type="email" id="email" class="form-control" placeholder="e.g., john@example.com"/>
          <span class="error-msg" id="email-error" style="color: #dc3545; font-size: 12px; display: block; margin-top: 4px;"></span>
        </div>
        <div class="form-group">
          <label for="password">Password <span class="required-star">*</span></label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password"/>
          <span class="error-msg" id="password-error" style="color: #dc3545; font-size: 12px; display: block; margin-top: 4px;"></span>
        </div>
        
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
          <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:14px;">
            <input type="checkbox" id="remember"/> Remember me
          </label>
          <a href="#" id="forgot-password-link" style="font-size:14px; color:var(--navy); text-decoration:none; font-weight:500;">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary" style="width:100%; padding:14px;">Sign In</button>
        <div class="alert-success" id="success-msg">✅ Login successful! Redirecting...</div>
      </form>
    </div>

    <div id="recovery-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; align-items:center; justify-content:center;">
  <div class="auth-card" style="max-width:400px; width:90%; position:relative;">
    <button id="close-modal" style="position:absolute; right:15px; top:15px; background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
    <h2>Reset Password</h2>
    <p id="recovery-desc" style="font-size:14px; color:var(--text-gray); margin-bottom:20px;">Enter your email for a verification code.</p>
    
    <div id="step-1-email">
      <div class="form-group">
        <input type="email" id="recovery-email" class="form-control" placeholder="your@email.com"/>
        <span class="error-msg" id="recovery-email-error" style="color:red; font-size:12px; display:block; margin-top:5px;"></span>
      </div>
      <button id="send-recovery-btn" class="btn-primary" style="width:100%; padding:12px;">Send Code</button>
    </div>

    <div id="step-2-reset" style="display:none;">
      <div class="form-group">
        <label style="font-size:14px; font-weight:500;">Verification Code</label>
        <input type="text" id="recovery-code" class="form-control" placeholder="Enterq code"/>
      </div>
      <div class="form-group">
        <label style="font-size:14px; font-weight:500;">New Password</label>
        <input type="password" id="new-password" class="form-control" placeholder="Min 6 characters"/>
        <span class="error-msg" id="new-password-error" style="color:red; font-size:12px; display:block; margin-top:5px;"></span>
      </div>
      <button id="confirm-reset-btn" class="btn-primary" style="width:100%; padding:12px;">Reset Password</button>
    </div>

    <div id="recovery-success-msg" style="display:none; margin-top:15px; color:green; text-align:center;">✅ Password reset successfully! You can now log in.</div>
  </div>
</div>
  </main>

  <script src="js/login.js"></script>
</body>
</html>
